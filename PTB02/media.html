<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giới thiệu Sản phẩm Multimedia</title>
    <style>
        .body 
        { 
            font-family: sans-serif; 
            line-height: 1.6; 
            max-width: 800px; 
            margin: auto; 
            padding: 20px; 
        }
        .figure 
        { 
            margin: 20px 0; 
            border: 1px solid #eee; 
            padding: 10px; 
            text-align: center; 
        }
        .figcaption 
        { 
            font-style: italic; 
            color: #555; 
            margin-top: 8px; 
        }
        .video, iframe 
        { 
            width: 100%; 
            border-radius: 8px; 
            margin-top: 10px; 
        }
        .logo-container 
        { 
            text-align: center; 
            margin-bottom: 30px; 
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="45" stroke="navy" stroke-width="3" fill="skyblue" />
            <text x="50%" y="55%" text-anchor="middle" fill="white" font-size="20" font-family="Arial">PRO</text>
        </svg>
        <h1>Tai Nghe FutureSound v1</h1>
    </div>

    <section>
        <h3>Nghe thử âm thanh thực tế:</h3>
        <audio controls>
            <source src="audio/ambient-nature.mp3" type="audio/mpeg">
            Trình duyệt của bạn không hỗ trợ thẻ audio.
        </audio>
    </section>

    <section>
        <h2>Hình ảnh chi tiết</h2>
        
        <figure>
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=800" 
                 alt="Tai nghe không dây màu đen đặt trên bàn gỗ" 
                 loading="lazy" 
                 style="max-width: 100%; height: auto;">
            <figcaption>Phối màu Đen Huyền Bí - Sang trọng và tinh tế.</figcaption>
        </figure>

        <figure>
            <img src="https://images.unsplash.com/photo-1484704849700-f032a568e944?w=800" 
                 alt="Cận cảnh đệm tai nghe bằng da cao cấp" 
                 loading="lazy" 
                 style="max-width: 100%; height: auto;">
            <figcaption>Đệm tai bằng da Protein mềm mại, không gây đau tai.</figcaption>
        </figure>

        <figure>
            <img src="https://images.unsplash.com/photo-1524678606370-a47ad25cb82a?w=800" 
                 alt="Tai nghe gập gọn lại bỏ vào túi đựng" 
                 loading="lazy" 
                 style="max-width: 100%; height: auto;">
            <figcaption>Khả năng gập gọn linh hoạt, dễ dàng mang đi du lịch.</figcaption>
        </figure>
    </section>

    <section>
        <h2>Video Review từ YouTube</h2>
        <iframe height="450" src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
                title="YouTube video player" frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen></iframe>
    </section>

    <section>
        <h2>Trailer Sản phẩm (Video nội bộ)</h2>
        <video controls poster="https://images.unsplash.com/photo-1583394838336-acd977736f90?w=800">
            <source src="videos/promo.mp4" type="video/mp4">
            <source src="videos/promo.webm" type="video/webm">
            Trình duyệt của bạn không hỗ trợ thẻ video.
        </video>
    </section>

</body>
</html>
